services:
  - type: web
    name: retain-ai-system
    runtime: python
    buildCommand: pip install -r requirements.txt && python app/ml/train.py
    startCommand: gunicorn app:app
    disk:
      name: sqlite-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/app.db
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
